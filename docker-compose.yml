services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8010:8000"
    environment:
      - GOLD_DIR=/app/data/gold
    volumes:
      # artefactos de modelo montados: entrenar en notebooks → soltar aquí sin rebuild
      - ./api/models:/app/models

  dashboard:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8501:8501"
